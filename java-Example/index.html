<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">

  <title>Number guessing game</title>

  <style>
    html {
      font-family: sans-serif;
    }

    body {
      width: 50%;
      max-width: 800px;
      min-width: 480px;
      margin: 0 auto;
    }

    .form input[type="number"] {
      width: 200px;
    }

    .lastResult {
      color: white;
      padding: 3px;
    }
  </style>
</head>

<body>
  <h1>Number guessing game</h1>

  <p>
    We have selected a random number between 1 and 100.
    See if you can guess it in 10 turns or fewer.
    We'll tell you if your guess was too high or too low.
  </p>

  <div class="form">
    <label for="guessField">Enter a guess: </label>
    <input
      type="number"
      min="1"
      max="100"
      required
      id="guessField"
      class="guessField" />

    <input
      type="submit"
      value="Submit guess"
      class="guessSubmit" />
  </div>

  <div class="resultParas">
    <p class="guesses"></p>
    <p class="lastResult"></p>
    <p class="lowOrHi"></p>
  </div>

  <script>
    let randomNumber=Math.floor(Math.random()*100)+1;
    const guesses=document.querySelector(".guesses");
    const lastResult=document.querySelector(".lastResult");
    const lowOrHi=document.querySelector(".lowOrHi");
    const guessSubmit=document.querySelector(".guessSubmit");
    const guessField=document.querySelector(".guessField");
    let guessCount=1;
    guessSubmit.addEventListener("click", checkGuess);
    function checkGuess()
    {
      const userGuess=Number(guessField.value);
      if (guessCount==1)
    {
      guesses.textContext="Previous guesses: ";
    }
    guesses.textContext+=userGuess+" ";
    if(userGuess==randomNumber)
    {
      lastResult.textContext="Congratulations! If you didn't get it first try, you are not better than Ben Belferder";
      lastResult.style.backgroundColor="green";
      lowOrHi.textContext="";
      setGameOver();

    }
    else
    {
      lastResult.textContext="Wrong";
      lastResult.style.backgroundColor="red";

      if(userGuess<randomNumber)
    {
      lowOrHi.textCintext="Last Guess was too high";
    }
    if(userGuess>randomNumber)
    {
      lowOrHi.textContext="Last Guess was too low";
    }
    }
    guessCount++;
    guessField.value="";
    guessField.focus();


    }
    function setGameOver()
    {
      guessFielf.disabled=true;
      guessSubmit.disabled=true;
      resetButton=document.createElement("button");
      resetButton.textContext="Start new game";
      document.body.appendChild(resetButton);
      resetButton.addEventListener("click", resetGame);
    }
    function resetGame()
    {
      guessCount=1;
      const resetParas=document.querySelectorAll(".resultParas p")
      for (const resetPara of resetParas)
    {
      resetPara.textContext="";
    }
    resetButton.parentNode.removeChild(resetButton);
    guessField.disabled=false;
    guessSubmit.disabled=false;
    guessField.value="";
    guessField.focus();
    lastResult.style.backgroundColor="white";
    randomNumber=Math.floor(Math.random()*100)+1;
    }

  </script>
</body>
</html>
